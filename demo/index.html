<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer Demo</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; font-family: system-ui; }
    #root { width: 100%; height: 100dvh; box-sizing: border-box; padding: 40px; }
    #root > * { border-radius: 12px; overflow: hidden; border: 1px solid #e4e4e7; }
    @media (max-width: 640px) { #root { padding: 0; } #root > * { border-radius: 0; border: none; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.tsx"></script>
</body>
</html>
