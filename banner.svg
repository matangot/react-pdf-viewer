    <rect x="547" y="345" width="46" height="2" rx="1" fill="#ebebeb"/>
    <text x="570" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">2</text>

    <!-- Thumbnail 3 (partial, cut off) -->
