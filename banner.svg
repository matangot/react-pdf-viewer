    <rect x="547" y="426" width="46" height="2" rx="1" fill="#ebebeb"/>

    <!-- ══════════════════════════════════════════ -->
    <!-- Main content area                         -->
    <!-- ══════════════════════════════════════════ -->
    <rect x="620" y="144" width="520" height="386" fill="#2a2a3e"/>

    <!-- PDF Page -->
    <rect x="680" y="162" width="400" height="350" rx="2" fill="#ffffff"/>

    <!-- Amorphic title block (centered, heavier weight) -->
    <rect x="790" y="194" width="180" height="7" rx="3.5" fill="#c0c0c0"/>
    <rect x="810" y="207" width="140" height="7" rx="3.5" fill="#c0c0c0"/>

    <!-- Amorphic author lines (centered, lighter) -->
    <rect x="775" y="228" width="210" height="3" rx="1.5" fill="#d8d8d8"/>
    <rect x="790" y="236" width="180" height="3" rx="1.5" fill="#d8d8d8"/>
    <rect x="800" y="244" width="160" height="3" rx="1.5" fill="#d8d8d8"/>

    <!-- Amorphic institution blocks -->
