<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="#818cf8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Subtle glow behind viewer -->
  <ellipse cx="830" cy="315" rx="380" ry="280" fill="url(#glow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- Left side: branding + text                -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Logo: 28x28 rounded box with centered 16px FileText icon (matches website nav) -->
  <rect x="60" y="155" width="28" height="28" rx="6" fill="#818cf8"/>
  <!-- FileText icon: 16x16, centered in 28x28 box → offset by 6,6 -->
  <g transform="translate(66 161) scale(0.667)" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
    <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
  </g>
  <!-- Logo text -->
  <text x="96" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e6edf3" letter-spacing="-0.3">React PDF Viewer</text>

  <!-- Title (with spacing below logo) -->
  <text x="60" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="url(#titleGrad)" letter-spacing="-1.5">The PDF Viewer</text>
  <text x="60" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="url(#titleGrad)" letter-spacing="-1.5">React Has Been</text>
  <text x="60" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="url(#titleGrad)" letter-spacing="-1.5">Missing</text>

  <!-- Subtitle -->
  <text x="60" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Blazing fast, lightweight, and drop-in ready.</text>
  <text x="60" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">One import. Zero config. All the features.</text>

  <!-- Stats -->
  <text x="60" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#818cf8">&lt;20 KB</text>
  <text x="60" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.5">GZIPPED</text>

  <text x="175" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#818cf8">TypeScript</text>
  <text x="175" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.5">FIRST</text>

  <text x="340" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#818cf8">MIT</text>
  <text x="340" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.5">LICENSED</text>

  <!-- Install command -->
  <rect x="60" y="460" width="380" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="76" y="485" font-family="ui-monospace, monospace" font-size="13" fill="#8b949e">$</text>
  <text x="92" y="485" font-family="ui-monospace, monospace" font-size="13" fill="#e6edf3">npm install @matangot/react-pdf-viewer</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Right side: PDF Viewer mockup             -->
  <!-- ══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Viewer outer frame -->
    <rect x="520" y="100" width="620" height="430" rx="12" fill="#1a1a2e" stroke="#30363d" stroke-width="1"/>

    <!-- Toolbar background -->
    <rect x="520" y="100" width="620" height="44" rx="12" fill="#1e1e2e"/>
    <rect x="520" y="132" width="620" height="12" fill="#1e1e2e"/>
    <line x1="520" y1="144" x2="1140" y2="144" stroke="#30363d" stroke-width="1"/>

    <!-- ── Toolbar Icons (Lucide, 24x24 viewBox scaled to ~16px) ── -->

    <!-- PanelLeft (thumbnail toggle) -->
    <g transform="translate(536 114) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect width="18" height="18" x="3" y="3" rx="2"/>
      <path d="M9 3v18"/>
    </g>

    <!-- ChevronLeft (prev page) -->
    <g transform="translate(572 114) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="m15 18-6-6 6-6"/>
    </g>

    <!-- Page input -->
    <rect x="592" y="114" width="32" height="20" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="608" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#e6edf3" text-anchor="middle">1</text>
    <text x="632" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">of 14</text>

    <!-- ChevronRight (next page) -->
    <g transform="translate(662 114) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="m9 18 6-6-6-6"/>
    </g>

    <!-- Hand (cursor mode) -->
    <g transform="translate(692 114) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
      <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
      <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
      <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
    </g>

    <!-- Search -->
    <g transform="translate(722 114) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.3-4.3"/>
    </g>

    <!-- ── Center: Zoom controls ── -->

    <!-- Minus button -->
    <circle cx="810" cy="122" r="12" fill="none" stroke="#30363d" stroke-width="1"/>
    <g transform="translate(800 112) scale(0.667)" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M5 12h14"/>
    </g>

    <!-- Zoom level input -->
    <rect x="830" y="112" width="56" height="20" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="850" y="126" font-family="system-ui, sans-serif" font-size="11" fill="#e6edf3">200%</text>
    <!-- ChevronDown in zoom dropdown -->
    <g transform="translate(872 116) scale(0.417)" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="m6 9 6 6 6-6"/>
    </g>

    <!-- Plus button -->
    <circle cx="902" cy="122" r="12" fill="none" stroke="#30363d" stroke-width="1"/>
    <g transform="translate(892 112) scale(0.667)" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M5 12h14"/>
      <path d="M12 5v14"/>
    </g>

    <!-- ── Right: action icons ── -->

    <!-- Sun (theme toggle) -->
    <g transform="translate(1008 110) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/>
      <path d="M12 20v2"/>
      <path d="m4.93 4.93 1.41 1.41"/>
      <path d="m17.66 17.66 1.41 1.41"/>
      <path d="M2 12h2"/>
      <path d="M20 12h2"/>
      <path d="m6.34 17.66-1.41 1.41"/>
      <path d="m19.07 4.93-1.41 1.41"/>
    </g>

    <!-- Download -->
    <g transform="translate(1036 110) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" x2="12" y1="15" y2="3"/>
    </g>

    <!-- Printer -->
    <g transform="translate(1064 110) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <path d="M6 9V3h12v6"/>
      <rect width="12" height="8" x="6" y="14"/>
    </g>

    <!-- Maximize (fullscreen) -->
    <g transform="translate(1092 110) scale(0.667)" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
      <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
      <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
      <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
    </g>

    <!-- EllipsisVertical (more menu) -->
